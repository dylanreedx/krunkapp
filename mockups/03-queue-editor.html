<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krunked - Queue Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #34d399;
    --accent-hover: #2cc48d;
    --bg: #faf9f7;
    --card: #fff;
    --black: #000;
    --gray-100: #f5f4f2;
    --gray-200: #e8e7e5;
    --gray-300: #d1d0ce;
    --gray-500: #888;
    --gray-700: #444;
    --gray-900: #1a1a1a;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --font-heading: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--gray-900);
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }

  /* TOP BAR */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    border-bottom: 1.5px solid var(--gray-200);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-700);
    cursor: pointer;
    text-decoration: none;
    transition: color 0.15s;
  }
  .topbar-left:hover { color: var(--gray-900); }
  .topbar-left svg { width: 18px; height: 18px; }
  .topbar-center {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .song-count-pill {
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 999px;
  }

  /* CONTAINER */
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 20px 140px;
  }

  /* QUEUE HEADER */
  .queue-header { margin-bottom: 28px; }
  .queue-title {
    font-family: var(--font-heading);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .queue-subtitle {
    font-size: 15px;
    color: var(--gray-500);
    margin-bottom: 10px;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--gray-100);
    color: var(--gray-700);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 999px;
  }
  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gray-500);
  }

  /* SONG INPUT */
  .song-input-section { margin-bottom: 24px; }
  .song-input-wrap {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 2px solid var(--black);
    border-radius: var(--radius-xl);
    padding: 6px 6px 6px 20px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .song-input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(52,211,153,0.18), var(--shadow);
  }
  .song-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 500;
    color: var(--gray-900);
    padding: 12px 0;
    min-width: 0;
  }
  .song-input::placeholder { color: var(--gray-300); font-weight: 400; }
  .add-btn {
    flex-shrink: 0;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .add-btn:hover { background: var(--accent-hover); }
  .add-btn:active { transform: scale(0.97); }

  /* SECTION LABEL */
  .section-label {
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-count {
    color: var(--gray-500);
    font-weight: 500;
  }

  /* SONG LIST */
  .song-list-card {
    background: var(--card);
    border: 2px solid var(--black);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .song-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    position: relative;
    transition: background 0.12s;
  }
  .song-row:hover { background: var(--gray-100); }
  .song-row:not(:last-child) { border-bottom: 1px solid var(--gray-200); }
  .song-pos {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .song-art {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200);
    flex-shrink: 0;
    overflow: hidden;
    background: var(--gray-100);
  }
  .song-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Placeholder art with initials */
  .song-art-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-heading);
    font-size: 14px;
    font-weight: 800;
    color: var(--gray-500);
    background: var(--gray-100);
  }
  .song-art-placeholder.art-1 { background: #ede9fe; color: #7c3aed; }
  .song-art-placeholder.art-2 { background: #fef3c7; color: #d97706; }
  .song-art-placeholder.art-3 { background: #dbeafe; color: #2563eb; }

  .song-info { flex: 1; min-width: 0; }
  .song-name {
    font-weight: 600;
    font-size: 15px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-artist {
    font-size: 13px;
    color: var(--gray-500);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .early-toggle {
    flex-shrink: 0;
    border: 2px solid var(--gray-300);
    background: transparent;
    color: var(--gray-500);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    letter-spacing: 0.2px;
    text-transform: uppercase;
  }
  .early-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .early-toggle.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .drag-handle {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: grab;
    padding: 4px;
    opacity: 0.3;
    transition: opacity 0.15s;
  }
  .song-row:hover .drag-handle { opacity: 0.7; }
  .drag-dots {
    display: flex;
    gap: 3px;
  }
  .drag-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gray-700);
  }

  .remove-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: var(--gray-200);
    color: var(--gray-700);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
  }
  .song-row:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { background: #fca5a5; color: #b91c1c; }

  /* RECIPIENTS */
  .recipients-section { margin-bottom: 32px; }
  .recipients-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .recipient-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 2px solid var(--black);
    border-radius: 999px;
    padding: 6px 12px 6px 6px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow);
  }
  .recipient-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }
  .recipient-avatar.av-1 { background: #818cf8; }
  .recipient-avatar.av-2 { background: #f472b6; }
  .chip-remove {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: none;
    background: var(--gray-200);
    color: var(--gray-700);
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 2px;
    transition: background 0.15s;
  }
  .chip-remove:hover { background: #fca5a5; color: #b91c1c; }

  .add-friend-card {
    border: 2px dashed var(--gray-300);
    border-radius: var(--radius-xl);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .add-friend-card:hover {
    border-color: var(--accent);
    background: rgba(52,211,153,0.04);
  }
  .add-friend-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px dashed var(--gray-300);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-500);
    font-size: 20px;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  .add-friend-card:hover .add-friend-icon {
    border-color: var(--accent);
    color: var(--accent);
  }
  .add-friend-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-700);
  }
  .add-friend-sub {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 1px;
  }

  /* Phone input (hidden by default) */
  .phone-input-row {
    display: none;
    gap: 8px;
    margin-top: 12px;
  }
  .phone-input-row.visible { display: flex; }
  .phone-input {
    flex: 1;
    border: 2px solid var(--black);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .phone-input:focus { border-color: var(--accent); }
  .find-btn {
    background: var(--card);
    border: 2px solid var(--black);
    border-radius: var(--radius-md);
    padding: 10px 20px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .find-btn:hover { background: var(--gray-100); }

  /* AI PREVIEW */
  .ai-preview-card {
    background: var(--card);
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-xl);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 32px;
    box-shadow: var(--shadow);
  }
  .ai-preview-text {
    font-size: 14px;
    color: var(--gray-700);
    line-height: 1.45;
  }
  .ai-preview-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 2px solid var(--black);
    border-radius: var(--radius-md);
    padding: 8px 16px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }
  .ai-preview-btn:hover { background: var(--gray-100); }
  .ai-preview-btn:active { transform: scale(0.97); }

  /* PUBLISH BUTTON */
  .publish-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px));
    z-index: 40;
  }
  .publish-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    background: var(--accent);
    color: #fff;
    border: 2px solid var(--black);
    border-radius: var(--radius-xl);
    padding: 16px 24px;
    font-family: var(--font-heading);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: var(--shadow);
  }
  .publish-btn:hover { background: var(--accent-hover); }
  .publish-btn:active { transform: scale(0.98); }
  .publish-btn svg { width: 18px; height: 18px; }
  .publish-btn.disabled {
    background: var(--gray-200);
    color: var(--gray-500);
    border-color: var(--gray-300);
    cursor: not-allowed;
  }

  /* DESKTOP */
  @media (min-width: 700px) {
    .publish-wrap {
      position: relative;
      background: none;
      padding: 0;
      margin-top: 8px;
    }
    .container { padding-bottom: 40px; }
  }

  /* Small touch targets */
  @media (hover: none) {
    .remove-btn { opacity: 0.6; }
    .drag-handle { opacity: 0.4; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <a class="topbar-left" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Dashboard
  </a>
  <span class="topbar-center">krunked</span>
  <span class="song-count-pill">3 songs</span>
</header>

<div class="container">

  <!-- QUEUE HEADER -->
  <div class="queue-header">
    <h1 class="queue-title">This week's queue</h1>
    <p class="queue-subtitle">Week of March 31</p>
    <span class="status-pill">Draft</span>
  </div>

  <!-- SONG INPUT -->
  <div class="song-input-section">
    <div class="song-input-wrap">
      <input class="song-input" type="text" placeholder="Paste a Spotify or Apple Music link...">
      <button class="add-btn">Add</button>
    </div>
  </div>

  <!-- SONG LIST -->
  <div class="section-label">Songs <span class="section-count">(3)</span></div>
  <div class="song-list-card">

    <!-- Song 1 -->
    <div class="song-row">
      <div class="song-pos">1</div>
      <div class="song-art"><div class="song-art-placeholder art-1">MC</div></div>
      <div class="song-info">
        <div class="song-name">Midnight City</div>
        <div class="song-artist">M83</div>
      </div>
      <button class="early-toggle active" onclick="this.classList.toggle('active')">Early</button>
      <div class="drag-handle">
        <div class="drag-dots"><span></span><span></span></div>
        <div class="drag-dots"><span></span><span></span></div>
        <div class="drag-dots"><span></span><span></span></div>
      </div>
      <button class="remove-btn" aria-label="Remove song">&times;</button>
    </div>

    <!-- Song 2 -->
    <div class="song-row">
      <div class="song-pos">2</div>
      <div class="song-art"><div class="song-art-placeholder art-2">T</div></div>
      <div class="song-info">
        <div class="song-name">Tadow</div>
        <div class="song-artist">Masego & FKJ</div>
      </div>
      <button class="early-toggle" onclick="this.classList.toggle('active')">Early</button>
      <div class="drag-handle">
        <div class="drag-dots"><span></span><span></span></div>
        <div class="drag-dots"><span></span><span></span></div>
        <div class="drag-dots"><span></span><span></span></div>
      </div>
      <button class="remove-btn" aria-label="Remove song">&times;</button>
    </div>

    <!-- Song 3 -->
    <div class="song-row">
      <div class="song-pos">3</div>
      <div class="song-art"><div class="song-art-placeholder art-3">N</div></div>
      <div class="song-info">
        <div class="song-name">Nights</div>
        <div class="song-artist">Frank Ocean</div>
      </div>
      <button class="early-toggle" onclick="this.classList.toggle('active')">Early</button>
      <div class="drag-handle">
        <div class="drag-dots"><span></span><span></span></div>
        <div class="drag-dots"><span></span><span></span></div>
        <div class="drag-dots"><span></span><span></span></div>
      </div>
      <button class="remove-btn" aria-label="Remove song">&times;</button>
    </div>

  </div>

  <!-- RECIPIENTS -->
  <div class="recipients-section">
    <div class="section-label">Recipients <span class="section-count">(2)</span></div>
    <div class="recipients-list">
      <div class="recipient-chip">
        <div class="recipient-avatar av-1">JM</div>
        <span>Jake M.</span>
        <button class="chip-remove" aria-label="Remove">&times;</button>
      </div>
      <div class="recipient-chip">
        <div class="recipient-avatar av-2">SR</div>
        <span>Sara R.</span>
        <button class="chip-remove" aria-label="Remove">&times;</button>
      </div>
    </div>
    <div class="add-friend-card" onclick="document.querySelector('.phone-input-row').classList.toggle('visible')">
      <div class="add-friend-icon">+</div>
      <div>
        <div class="add-friend-text">Add friend</div>
        <div class="add-friend-sub">Add by phone number</div>
      </div>
    </div>
    <div class="phone-input-row">
      <input class="phone-input" type="tel" placeholder="(555) 123-4567">
      <button class="find-btn">Find</button>
    </div>
  </div>

  <!-- AI PREVIEW -->
  <div class="ai-preview-card">
    <div class="ai-preview-text">Queue name and cover art will be generated when you publish</div>
    <button class="ai-preview-btn">Preview AI</button>
  </div>

  <!-- PUBLISH (desktop position) -->
  <div class="publish-wrap">
    <button class="publish-btn">
      Publish Queue
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
    </button>
  </div>

</div>

</body>
</html>

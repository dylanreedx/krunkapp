<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>krunk — edit queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff2d78;
    --black: #111;
    --gray: #888;
    --light-gray: #e5e5e5;
    --white: #ffffff;
    --font-display: 'Unbounded', sans-serif;
    --font-body: 'Inter', sans-serif;
    --border: 3px solid var(--black);
    --radius: 20px;
  }

  body {
    background: var(--white);
    color: var(--black);
    font-family: var(--font-body);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 120px;
  }

  /* --- TOP BAR --- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 3px solid var(--black);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 100;
  }

  .back-link {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--black);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s;
    min-width: 120px;
  }

  .back-link:hover {
    color: var(--pink);
  }

  .back-link svg {
    width: 18px;
    height: 18px;
  }

  .top-brand {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .top-brand span {
    color: var(--pink);
  }

  .song-count-pill {
    background: var(--pink);
    color: var(--white);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 100px;
    letter-spacing: 0.02em;
    min-width: 120px;
    text-align: right;
  }

  /* --- MAIN CONTENT --- */
  .main {
    max-width: 620px;
    margin: 0 auto;
    padding: 40px 24px 0;
  }

  /* --- QUEUE HEADER --- */
  .queue-header {
    margin-bottom: 36px;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  }

  .queue-heading {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }

  .queue-subtitle {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--gray);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-pill {
    display: inline-block;
    background: #f0f0f0;
    color: var(--gray);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
  }

  /* --- SONG INPUT (HERO) --- */
  .song-input-wrapper {
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.25s forwards;
  }

  .song-input-box {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 3px solid var(--pink);
    border-radius: 18px;
    padding: 6px 6px 6px 24px;
    background: var(--white);
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 0 4px rgba(255, 45, 120, 0.1);
  }

  .song-input-box.unfocused {
    border-color: var(--black);
    box-shadow: none;
  }

  .song-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: var(--font-body);
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--black);
    background: transparent;
    padding: 14px 0;
    min-width: 0;
  }

  .song-input::placeholder {
    color: #bbb;
    font-weight: 400;
  }

  .add-btn {
    flex-shrink: 0;
    background: var(--pink);
    color: var(--white);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    border-radius: 13px;
    padding: 14px 28px;
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s;
  }

  .add-btn:hover {
    transform: scale(1.04);
  }

  .add-btn:active {
    transform: scale(0.97);
  }

  .input-hint {
    font-size: 0.78rem;
    color: var(--gray);
    margin-top: 10px;
    padding-left: 4px;
  }

  .input-hint svg {
    width: 14px;
    height: 14px;
    vertical-align: -2px;
    margin-right: 4px;
  }

  /* --- SONG LIST --- */
  .song-list-section {
    margin-bottom: 36px;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
  }

  .song-list-container {
    border: 3px solid var(--black);
    border-radius: 22px;
    overflow: hidden;
  }

  .song-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    position: relative;
    transition: background 0.12s;
  }

  .song-row:hover {
    background: #fafafa;
  }

  .song-row:hover .remove-btn {
    opacity: 1;
  }

  .song-row + .song-row {
    border-top: 1px solid var(--light-gray);
  }

  .song-pos {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--pink);
    color: var(--white);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .song-art {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: 3px solid var(--black);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .song-art.art-blue { background: #c5e3ff; }
  .song-art.art-orange { background: #ffd6b0; }
  .song-art.art-purple { background: #e0d0ff; }

  .song-art svg {
    width: 20px;
    height: 20px;
    opacity: 0.4;
  }

  .song-details {
    flex: 1;
    min-width: 0;
  }

  .song-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.92rem;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .song-artist {
    font-family: var(--font-body);
    font-size: 0.8rem;
    color: var(--gray);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .early-toggle {
    flex-shrink: 0;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid transparent;
    user-select: none;
  }

  .early-toggle.active {
    background: var(--pink);
    color: var(--white);
    border-color: var(--pink);
  }

  .early-toggle.inactive {
    background: transparent;
    color: var(--gray);
    border-color: var(--light-gray);
  }

  .early-toggle.inactive:hover {
    border-color: var(--black);
    color: var(--black);
  }

  .drag-handle {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
    cursor: grab;
    padding: 4px;
    opacity: 0.25;
    transition: opacity 0.15s;
  }

  .song-row:hover .drag-handle {
    opacity: 0.5;
  }

  .drag-handle span {
    display: flex;
    gap: 3px;
  }

  .drag-handle span i {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--black);
    display: block;
  }

  .remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: #f0f0f0;
    color: var(--gray);
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.12s, color 0.12s;
    line-height: 1;
  }

  .remove-btn:hover {
    background: var(--pink);
    color: var(--white);
  }

  /* --- RECIPIENTS --- */
  .recipients-section {
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards;
  }

  .section-heading {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 1.1rem;
    margin-bottom: 16px;
  }

  .section-heading .count {
    color: var(--gray);
    font-weight: 700;
  }

  .recipients-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .recipient-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 3px solid var(--black);
    border-radius: 100px;
    padding: 6px 16px 6px 6px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
  }

  .recipient-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.7rem;
    color: var(--white);
    flex-shrink: 0;
  }

  .avatar-pink { background: var(--pink); }
  .avatar-black { background: var(--black); }

  .add-friend-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 3px dashed var(--gray);
    border-radius: 100px;
    padding: 10px 20px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--gray);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    background: none;
  }

  .add-friend-chip:hover {
    border-color: var(--pink);
    color: var(--pink);
  }

  .add-friend-chip svg {
    width: 18px;
    height: 18px;
  }

  /* --- AI PREVIEW TEASER --- */
  .ai-preview-card {
    border: 3px solid var(--black);
    border-radius: 20px;
    padding: 22px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 36px;
    transform: rotate(-0.6deg);
    opacity: 0;
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards;
  }

  .ai-preview-text {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--gray);
    line-height: 1.45;
    font-weight: 500;
  }

  .ai-preview-btn {
    flex-shrink: 0;
    background: var(--white);
    color: var(--black);
    border: 3px solid var(--black);
    border-radius: 14px;
    padding: 12px 22px;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.82rem;
    cursor: pointer;
    transition: transform 0.12s, background 0.12s;
    white-space: nowrap;
  }

  .ai-preview-btn:hover {
    transform: translateY(-2px);
    background: #f8f8f8;
  }

  /* --- PUBLISH BUTTON (FIXED) --- */
  .publish-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 24px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: var(--white);
    border-top: 3px solid var(--black);
    z-index: 100;
  }

  .publish-btn {
    display: block;
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
    background: var(--pink);
    color: var(--white);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.1rem;
    border: none;
    border-radius: 18px;
    padding: 20px 32px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.15s;
    letter-spacing: -0.01em;
  }

  .publish-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255, 45, 120, 0.3);
  }

  .publish-btn:active {
    transform: translateY(0);
    box-shadow: none;
  }

  /* --- ANIMATIONS --- */
  @keyframes slideUp {
    to {
      opacity: 1;
      transform: translateY(0) rotate(0deg);
    }
  }

  /* Specific fix for the rotated AI card */
  .ai-preview-card {
    --target-rotation: -0.6deg;
  }

  @keyframes slideUpRotated {
    to {
      opacity: 1;
      transform: translateY(0) rotate(-0.6deg);
    }
  }

  .ai-preview-card {
    animation-name: slideUpRotated;
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 640px) {
    .top-bar {
      padding: 14px 16px;
    }

    .back-link {
      min-width: auto;
      font-size: 0.82rem;
    }

    .back-link .back-text {
      display: none;
    }

    .song-count-pill {
      min-width: auto;
    }

    .main {
      padding: 28px 16px 0;
    }

    .queue-heading {
      font-size: 1.7rem;
    }

    .song-input-box {
      padding: 4px 4px 4px 16px;
    }

    .song-input {
      font-size: 0.95rem;
      padding: 12px 0;
    }

    .add-btn {
      padding: 12px 20px;
      font-size: 0.88rem;
    }

    .song-row {
      padding: 14px 14px;
      gap: 10px;
    }

    .song-art {
      width: 42px;
      height: 42px;
    }

    .song-title {
      font-size: 0.85rem;
    }

    .early-toggle {
      font-size: 0.6rem;
      padding: 4px 10px;
    }

    .ai-preview-card {
      flex-direction: column;
      text-align: center;
      gap: 14px;
    }

    .publish-bar {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .publish-btn {
      padding: 18px 24px;
      font-size: 1rem;
    }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  <a href="#" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span class="back-text">Dashboard</span>
  </a>
  <div class="top-brand">krun<span>k</span></div>
  <div class="song-count-pill">3 songs</div>
</header>

<!-- MAIN CONTENT -->
<main class="main">

  <!-- QUEUE HEADER -->
  <div class="queue-header">
    <h1 class="queue-heading">This week's queue</h1>
    <div class="queue-subtitle">
      Week of March 31
      <span class="status-pill">Draft</span>
    </div>
  </div>

  <!-- SONG INPUT (HERO) -->
  <div class="song-input-wrapper">
    <div class="song-input-box">
      <input type="text" class="song-input" placeholder="Paste a Spotify or Apple Music link..." autofocus>
      <button class="add-btn">Add</button>
    </div>
    <div class="input-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      Supports Spotify and Apple Music share links
    </div>
  </div>

  <!-- SONG LIST -->
  <div class="song-list-section">
    <div class="song-list-container">

      <!-- Song 1 -->
      <div class="song-row">
        <div class="song-pos">1</div>
        <div class="song-art art-blue">
          <svg viewBox="0 0 24 24" fill="var(--black)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="song-details">
          <div class="song-title">Midnight City</div>
          <div class="song-artist">M83</div>
        </div>
        <div class="early-toggle active">Early</div>
        <div class="drag-handle">
          <span><i></i><i></i></span>
          <span><i></i><i></i></span>
          <span><i></i><i></i></span>
        </div>
        <button class="remove-btn">&times;</button>
      </div>

      <!-- Song 2 -->
      <div class="song-row">
        <div class="song-pos">2</div>
        <div class="song-art art-orange">
          <svg viewBox="0 0 24 24" fill="var(--black)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="song-details">
          <div class="song-title">Tadow</div>
          <div class="song-artist">Masego & FKJ</div>
        </div>
        <div class="early-toggle inactive">Early</div>
        <div class="drag-handle">
          <span><i></i><i></i></span>
          <span><i></i><i></i></span>
          <span><i></i><i></i></span>
        </div>
        <button class="remove-btn">&times;</button>
      </div>

      <!-- Song 3 -->
      <div class="song-row">
        <div class="song-pos">3</div>
        <div class="song-art art-purple">
          <svg viewBox="0 0 24 24" fill="var(--black)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="song-details">
          <div class="song-title">Nights</div>
          <div class="song-artist">Frank Ocean</div>
        </div>
        <div class="early-toggle inactive">Early</div>
        <div class="drag-handle">
          <span><i></i><i></i></span>
          <span><i></i><i></i></span>
          <span><i></i><i></i></span>
        </div>
        <button class="remove-btn">&times;</button>
      </div>

    </div>
  </div>

  <!-- RECIPIENTS -->
  <div class="recipients-section">
    <h2 class="section-heading">Recipients <span class="count">(2)</span></h2>
    <div class="recipients-list">
      <div class="recipient-chip">
        <div class="recipient-avatar avatar-pink">JL</div>
        Jamie L.
      </div>
      <div class="recipient-chip">
        <div class="recipient-avatar avatar-black">KR</div>
        Kai R.
      </div>
      <button class="add-friend-chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add by phone
      </button>
    </div>
  </div>

  <!-- AI PREVIEW TEASER -->
  <div class="ai-preview-card">
    <div class="ai-preview-text">Queue name and cover art generated at publish</div>
    <button class="ai-preview-btn">Preview AI &#10024;</button>
  </div>

</main>

<!-- PUBLISH BUTTON (FIXED) -->
<div class="publish-bar">
  <button class="publish-btn">Publish Queue &rarr;</button>
</div>

</body>
</html>
